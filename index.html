<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grabadora Web Profesional</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-body: #0f172a;       /* Fondo oscuro principal */
            --bg-card: #1e293b;       /* Fondo de paneles */
            --primary: #3b82f6;       /* Azul interactivo */
            --primary-hover: #2563eb;
            --danger: #ef4444;        /* Rojo grabación */
            --warning: #f59e0b;       /* Amarillo pausa */
            --success: #10b981;       /* Verde éxito */
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        body { 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            background-color: var(--bg-body);
            color: var(--text-main);
            padding: 20px;
        }

        /* --- BARRA DE NAVEGACIÓN (PESTAÑAS) --- */
        .nav-tabs {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn svg { width: 18px; height: 18px; }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(59, 130, 246, 0.3);
        }

        /* --- VISTAS (SECCIONES) --- */
        .view-section {
            display: none;
            width: 100%;
            max-width: 550px;
            animation: fadeIn 0.25s ease-in-out;
        }

        .view-section.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- PANEL DE GRABACIÓN --- */
        .card { 
            background: var(--bg-card); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 40px 35px; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        h2 { margin-bottom: 25px; font-weight: 600; font-size: 22px; color: var(--text-main); }

        .form-input {
            width: 100%; padding: 14px; background: var(--bg-body); border: 1px solid var(--border);
            border-radius: 8px; color: white; font-size: 16px; outline: none; margin-bottom: 20px;
            text-align: center; transition: border-color 0.2s;
        }
        .form-input:focus { border-color: var(--primary); }

        .status-badge { 
            display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 12px; 
            font-weight: 700; letter-spacing: 1px; margin-bottom: 25px; 
            background: var(--border); color: var(--text-muted);
        }
        .status-badge.recording { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); animation: pulse 1.5s infinite; }
        .status-badge.paused { background: rgba(245, 158, 11, 0.1); color: var(--warning); border: 1px solid var(--warning); }
        .status-badge.success { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        
        @keyframes pulse { 
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } 
        }

        .timer { font-size: 60px; font-weight: 700; font-variant-numeric: tabular-nums; margin-bottom: 30px; color: white; }

        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 25px; }
        .btn-ctrl { display: flex; align-items: center; justify-content: center; width: 64px; height: 64px; border-radius: 50%; border: none; cursor: pointer; color: white; transition: transform 0.2s, background 0.2s; }
        .btn-ctrl svg { width: 24px; height: 24px; }
        .btn-ctrl:disabled { opacity: 0.2; cursor: not-allowed; transform: none !important; }
        
        .btn-record { background: var(--danger); }
        .btn-record:hover:not(:disabled) { transform: scale(1.05); }
        .btn-pause { background: var(--warning); color: black; }
        .btn-pause:hover:not(:disabled) { transform: scale(1.05); }
        .btn-stop { background: #475569; }
        .btn-stop:hover:not(:disabled) { transform: scale(1.05); }

        .playback-container { margin-top: 20px; display: none; flex-direction: column; gap: 15px; border-top: 1px solid var(--border); padding-top: 25px;}
        .playback-container.active { display: flex; }
        audio { width: 100%; outline: none; }

        .btn-main {
            width: 100%; padding: 14px; background: var(--primary); color: white;
            border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
        }
        .btn-main:hover { background: var(--primary-hover); }

        /* --- VISTA DE HISTORIAL Y BUSCADOR --- */
        .history-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 30px 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-body);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0 14px;
            margin-bottom: 20px;
        }
        .search-box svg { color: var(--text-muted); width: 20px; height: 20px; }
        .search-input {
            width: 100%; border: none; background: transparent; color: white;
            padding: 12px; outline: none; font-size: 14px;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding: 0 4px;
        }
        .history-header h3 { font-size: 15px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
        
        .btn-clear {
            background: transparent; border: 1px solid var(--border); color: var(--text-muted);
            padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: 0.2s;
        }
        .btn-clear:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); border-color: var(--danger); }

        .table-wrapper { max-height: 320px; overflow-y: auto; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-body); }
        
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th { background: #1e293b; padding: 12px 14px; color: var(--text-muted); font-weight: 600; font-size: 11px; text-transform: uppercase; position: sticky; top: 0; border-bottom: 1px solid var(--border); }
        td { padding: 14px; border-bottom: 1px solid var(--border); color: var(--text-main); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255, 255, 255, 0.02); }
        
        .empty-msg { text-align: center; color: var(--text-muted); padding: 30px; font-size: 13px; }
        .td-duration { font-family: monospace; color: var(--primary); font-weight: 600; font-size: 14px; }
    </style>
</head>
<body>

    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchView('recorder')">
            <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"></path></svg>
            Grabación
        </button>
        <button class="tab-btn" onclick="switchView('history')">
            <svg fill="currentColor" viewBox="0 0 20 20"><path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path><path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"></path></svg>
            Historial Local
        </button>
    </nav>

    <section id="view-recorder" class="view-section active">
        <div class="card">
            <h2>Grabadora Web</h2>
            
            <input type="text" id="record-title" class="form-input" placeholder="Nombre del archivo..." autocomplete="off">
            
            <div class="status-badge" id="status-text">LISTO PARA GRABAR</div>
            <div class="timer" id="timer">00:00</div>
            
            <div class="controls">
                <button class="btn-ctrl btn-record" id="btn-record" onclick="startRecording()" title="Iniciar">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"></path></svg>
                </button>
                <button class="btn-ctrl btn-pause" id="btn-pause" onclick="togglePause()" disabled title="Pausar / Reanudar">
                    <svg id="icon-pause" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                </button>
                <button class="btn-ctrl btn-stop" id="btn-stop" onclick="stopRecording()" disabled title="Detener">
                    <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>
                </button>
            </div>

            <div class="playback-container" id="playback-container">
                <audio id="audio-playback" controls></audio>
                <button class="btn-main" id="btn-save" onclick="saveAudio()">Elegir carpeta y Guardar</button>
            </div>
        </div>
    </section>

    <section id="view-history" class="view-section">
        <div class="history-card">
            <div class="search-box">
                <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" class="search-input" placeholder="Buscar por nombre de archivo o fecha..." oninput="filterHistory()">
            </div>

            <div class="history-header">
                <h3>Registros en este equipo</h3>
                <button class="btn-clear" onclick="clearHistory()">Limpiar todo</button>
            </div>
            
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Fecha / Hora</th>
                            <th>Nombre de Archivo</th>
                            <th>Duración</th>
                        </tr>
                    </thead>
                    <tbody id="history-body"></tbody>
                </table>
                <div id="empty-state" class="empty-msg">No se encontraron registros.</div>
            </div>
        </div>
    </section>

    <script>
        let mediaRecorder;
        let audioChunks = [];
        let timerInt;
        let sec = 0;
        let audioBlobFinal = null;
        let lastDuration = "00:00"; 

        const elTimer = document.getElementById('timer');
        const elStatus = document.getElementById('status-text');
        const btnRecord = document.getElementById('btn-record');
        const btnPause = document.getElementById('btn-pause');
        const iconPause = document.getElementById('icon-pause');
        const btnStop = document.getElementById('btn-stop');
        const playbackContainer = document.getElementById('playback-container');
        const audioPlayback = document.getElementById('audio-playback');
        const inputTitle = document.getElementById('record-title');
        const historyBody = document.getElementById('history-body');
        const emptyState = document.getElementById('empty-state');
        const searchInput = document.getElementById('search-input');

        window.onload = () => { renderHistory(); };

        // --- SISTEMA DE CAMBIO DE PESTAÑAS (VISTAS) ---
        function switchView(viewId) {
            // Alternar clases activas en botones
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');

            // Alternar visibilidad de las secciones
            document.querySelectorAll('.view-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');

            // Recargar datos o limpiar buscador al cambiar al historial
            if (viewId === 'history') {
                searchInput.value = ""; 
                renderHistory();
            }
        }

        // --- LÓGICA DEL TEMPORIZADOR ---
        function updateTimerDisplay() {
            const m = String(Math.floor(sec / 60)).padStart(2, '0');
            const s = String(sec % 60).padStart(2, '0');
            elTimer.textContent = `${m}:${s}`;
        }

        function startTimer() {
            timerInt = setInterval(() => { sec++; updateTimerDisplay(); }, 1000);
        }

        // --- CONTROLADORES DE AUDIO ---
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => { if(event.data.size > 0) audioChunks.push(event.data); };
                mediaRecorder.onstop = () => {
                    audioBlobFinal = new Blob(audioChunks, { type: 'audio/webm' });
                    audioPlayback.src = URL.createObjectURL(audioBlobFinal);
                    playbackContainer.classList.add('active');
                };

                mediaRecorder.start();
                playbackContainer.classList.remove('active');
                btnRecord.disabled = true; btnPause.disabled = false; btnStop.disabled = false;
                updatePauseIcon(false);
                elStatus.textContent = "● GRABANDO"; elStatus.className = "status-badge recording";
                sec = 0; updateTimerDisplay(); startTimer();
            } catch (err) {
                alert("Permiso de micrófono denegado.");
            }
        }

        function togglePause() {
            if (!mediaRecorder) return;
            if (mediaRecorder.state === "recording") {
                mediaRecorder.pause(); clearInterval(timerInt);
                elStatus.textContent = "⏸ EN PAUSA"; elStatus.className = "status-badge paused";
                updatePauseIcon(true);
            } else if (mediaRecorder.state === "paused") {
                mediaRecorder.resume(); startTimer(); 
                elStatus.textContent = "● GRABANDO"; elStatus.className = "status-badge recording";
                updatePauseIcon(false);
            }
        }

        function updatePauseIcon(isPaused) {
            iconPause.innerHTML = isPaused 
                ? '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>'
                : '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>';
        }

        function stopRecording() {
            if(!mediaRecorder || mediaRecorder.state === "inactive") return;
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(track => track.stop());
            clearInterval(timerInt);
            
            lastDuration = elTimer.textContent; 
            
            btnRecord.disabled = false; btnPause.disabled = true; btnStop.disabled = true;
            elStatus.textContent = "AUDIO PROCESADO"; elStatus.className = "status-badge";
            updatePauseIcon(false);
        }

        // --- EXPORTACIÓN Y PERSISTENCIA ---
        async function saveAudio() {
            if (!audioBlobFinal) return;
            let title = inputTitle.value.trim() || "Audio_Grabado";

            if (window.showSaveFilePicker) {
                try {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: `${title}.webm`,
                        types: [{ description: 'Audio WebM', accept: { 'audio/webm': ['.webm'] } }],
                    });
                    const writable = await handle.createWritable();
                    await writable.write(audioBlobFinal);
                    await writable.close();
                    
                    addRecordToLocalStorage(title, lastDuration);
                    resetUI();
                } catch (err) {
                    console.log("Guardado cancelado por el usuario.");
                }
            } else {
                const audioUrl = URL.createObjectURL(audioBlobFinal);
                const a = document.createElement('a');
                a.href = audioUrl; a.download = `${title}.webm`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                
                addRecordToLocalStorage(title, lastDuration);
                resetUI();
            }
        }

        function resetUI() {
            elStatus.textContent = "✓ GUARDADO Y REGISTRADO";
            elStatus.className = "status-badge success";
            inputTitle.value = "";
            playbackContainer.classList.remove('active');
            elTimer.textContent = "00:00";
        }

        function addRecordToLocalStorage(nombre, duracion) {
            const ahora = new Date();
            const fechaStr = `${String(ahora.getDate()).padStart(2, '0')}/${String(ahora.getMonth() + 1).padStart(2, '0')}/${ahora.getFullYear()} ${String(ahora.getHours()).padStart(2, '0')}:${String(ahora.getMinutes()).padStart(2, '0')}`;

            let localHistory = JSON.parse(localStorage.getItem('app_audio_history')) || [];
            localHistory.unshift({ fecha: fechaStr, nombre: nombre, duracion: duracion });
            localStorage.setItem('app_audio_history', JSON.stringify(localHistory));
        }

        // --- RENDEREADO Y FILTRADO DEL HISTORIAL ---
        function renderHistory() {
            let localHistory = JSON.parse(localStorage.getItem('app_audio_history')) || [];
            historyBody.innerHTML = "";

            if (localHistory.length === 0) {
                emptyState.style.display = "block";
                emptyState.textContent = "No hay audios registrados en este equipo.";
                return;
            }

            emptyState.style.display = "none";
            localHistory.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td style="color: var(--text-muted);">${item.fecha}</td>
                    <td style="font-weight: 500;">${item.nombre}</td>
                    <td class="td-duration">${item.duracion}</td>
                `;
                historyBody.appendChild(row);
            });
        }

        // FUNCIÓN DEL BUSCADOR EN TIEMPO REAL
        function filterHistory() {
            const filterValue = searchInput.value.toLowerCase().trim();
            const rows = historyBody.getElementsByTagName('tr');
            let visibleRowsCount = 0;

            for (let i = 0; i < rows.length; i++) {
                // Obtener texto de la fecha (columna 0) y del nombre (columna 1)
                const dateText = rows[i].getElementsByTagName('td')[0].textContent.toLowerCase();
                const nameText = rows[i].getElementsByTagName('td')[1].textContent.toLowerCase();

                if (dateText.includes(filterValue) || nameText.includes(filterValue)) {
                    rows[i].style.display = "";
                    visibleRowsCount++;
                } else {
                    rows[i].style.display = "none";
                }
            }

            // Mostrar mensaje de vacío si no coincide nada con la búsqueda
            if (visibleRowsCount === 0 && rows.length > 0) {
                emptyState.style.display = "block";
                emptyState.textContent = "No se encontraron resultados para tu búsqueda.";
            } else if (rows.length > 0) {
                emptyState.style.display = "none";
            }
        }

        function clearHistory() {
            if (confirm("¿Estás seguro de que deseas borrar todo el historial de registros de esta computadora?")) {
                localStorage.removeItem('app_audio_history');
                renderHistory();
            }
        }
    </script>
</body>
</html>
