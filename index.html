<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Interconexiones 360 - CRM</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

        :root {
            --primary: #8b5cf6; 
            --primary-hover: #7c3aed;
            --success: #10b981; 
            --danger: #f43f5e; 
            --warning: #fbbf24;
            --bg-dark: #0f172a;
            --panel-bg: rgba(15, 23, 42, 0.95);
            --border-light: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { box-sizing: border-box; font-family: 'Nunito', sans-serif; margin: 0; padding: 0; }
        
        body { 
            display: flex; height: 100vh; overflow: hidden; 
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: var(--text-main);
        }

        .glass-panel { background: var(--panel-bg); border: 1px solid var(--border-light); border-radius: 16px; }
        svg { width: 24px; height: 24px; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* --- LOGIN --- */
        .login-overlay { position: fixed; inset: 0; background: var(--bg-dark); z-index: 1000; display: flex; justify-content: center; align-items: center; transition: opacity 0.3s; padding: 20px; }
        .login-overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .login-box { background: var(--panel-bg); border: 1px solid var(--border-light); padding: 40px 30px; border-radius: 24px; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo-placeholder { width: 70px; height: 70px; border-radius: 16px; margin: 0 auto 15px; border: 2px solid var(--primary); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 800; background: rgba(139, 92, 246, 0.2); color: var(--primary); }
        .login-box h2 { margin-bottom: 5px; font-size: 22px; }
        .login-box p { color: var(--text-muted); margin-bottom: 25px; font-size: 14px; }
        
        /* --- SIDEBAR --- */
        .sidebar { width: 260px; display: flex; flex-direction: column; align-items: center; padding: 25px 15px; border-right: 1px solid var(--border-light); border-radius: 0; background: var(--panel-bg); }
        .sidebar .logo-placeholder { width: 50px; height: 50px; font-size: 20px; margin-bottom: 20px; }
        .agent-profile { width: 100%; background: rgba(0,0,0,0.2); border-radius: 16px; padding: 15px; text-align: center; margin-bottom: 25px; }
        .agent-profile h3 { font-size: 15px; margin-bottom: 5px; word-break: break-word; }
        .agent-profile p { font-size: 11px; color: var(--success); text-transform: uppercase; margin-bottom: 10px; }
        .btn-logout { background: rgba(244, 63, 94, 0.1); color: #fda4af; border: 1px solid rgba(244, 63, 94, 0.2); padding: 8px; border-radius: 8px; font-size: 12px; cursor: pointer; width: 100%; transition: 0.2s; }
        .btn-logout:hover { background: var(--danger); color: white; }
        .nav-menu { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .nav-item { padding: 12px 15px; display: flex; align-items: center; gap: 12px; color: #cbd5e1; border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }

        /* --- MAIN LAYOUT --- */
        .main-wrapper { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; }
        .top-header { height: 70px; display: flex; justify-content: space-between; align-items: center; padding: 0 25px; border-bottom: 1px solid var(--border-light); margin-bottom: 15px; background: rgba(15, 23, 42, 0.5); }
        .header-title { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--primary); display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid white; }
        .view-section { display: none; flex: 1; overflow-y: auto; padding: 15px 25px; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- WORKSPACE --- */
        .workspace-center { display: flex; justify-content: center; align-items: flex-start; min-height: 100%; padding-bottom: 20px; }
        .unified-card { width: 100%; max-width: 600px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .card-header { padding: 15px 20px; border-bottom: 1px solid var(--border-light); font-weight: 700; font-size: 14px; background: rgba(0,0,0,0.2); text-transform: uppercase; color: var(--text-muted); text-align: center; }
        .card-body { padding: 25px; display: flex; flex-direction: column; gap: 25px; }

        /* --- RECORDER UI --- */
        .recorder-display { display: flex; flex-direction: column; align-items: center; background: rgba(0,0,0,0.3); border-radius: 16px; padding: 25px 20px; border: 1px solid var(--border-light); }
        .status-text { font-size: 14px; font-weight: 800; letter-spacing: 1px; margin-bottom: 10px; padding: 6px 15px; border-radius: 12px; background: rgba(0,0,0,0.5); color: var(--text-muted); transition: 0.3s; }
        .status-text.recording { color: white; background: var(--danger); }
        .status-text.paused { color: #000; background: var(--warning); }
        .timer-text { font-size: clamp(40px, 8vw, 65px); font-weight: 800; letter-spacing: 2px; margin-bottom: 15px; font-variant-numeric: tabular-nums; }
        
        .audio-wave { display: flex; gap: 6px; height: 40px; align-items: center; opacity: 0.2; transition: 0.3s; }
        .audio-wave.active { opacity: 1; }
        .bar { width: 8px; background: var(--primary); border-radius: 4px; height: 10px; transition: height 0.1s ease; }
        .audio-wave.active .bar { animation: simpleBounce 0.5s infinite alternate; }
        .audio-wave.active .bar:nth-child(even) { animation-delay: 0.2s; }
        @keyframes simpleBounce { to { height: 40px; } }

        .controls-row { display: flex; gap: 15px; justify-content: center; }
        .btn-round { width: 65px; height: 65px; border-radius: 50%; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s; background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border-light); }
        .btn-round:hover:not(:disabled) { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .btn-round:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
        .btn-round svg { width: 28px; height: 28px; }
        .btn-record { background: rgba(244, 63, 94, 0.1); color: var(--danger); border-color: rgba(244, 63, 94, 0.3); }
        .btn-record:hover:not(:disabled) { background: var(--danger); color: white; }
        .btn-pause { color: var(--warning); border-color: rgba(251, 191, 36, 0.3); }
        .btn-pause:hover:not(:disabled) { background: var(--warning); color: black; }

        /* --- INPUTS --- */
        .form-section { border-top: 1px solid var(--border-light); padding-top: 20px; display: flex; flex-direction: column; gap: 15px; }
        .input-base { width: 100%; padding: 15px; border: 1px solid var(--border-light); border-radius: 12px; font-size: 15px; background: rgba(0,0,0,0.3); color: white; outline: none; transition: 0.2s; text-align: center; }
        .input-base:focus { border-color: var(--primary); background: rgba(0,0,0,0.5); }
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; transition: 0.2s; text-transform: uppercase; letter-spacing: 1px; } 
        .btn-main:hover:not(:disabled) { background: var(--primary-hover); }
        .btn-main:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; }

        /* --- HISTORY --- */
        .history-wrapper { display: flex; flex-direction: column; height: 100%; gap: 15px;}
        .search-box { position: relative; width: 100%; }
        .search-icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px; }
        .search-box .input-base { padding-left: 45px; text-align: left; }
        .table-container { flex: 1; overflow-y: auto; background: var(--panel-bg); border-radius: 16px; border: 1px solid var(--border-light); }
        .history-table { width: 100%; border-collapse: collapse; text-align: left; min-width: 500px; }
        .history-table th { background: rgba(0,0,0,0.4); padding: 15px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; position: sticky; top: 0; }
        .history-table td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
        .agent-tag { background: rgba(139, 92, 246, 0.15); color: #c4b5fd; padding: 4px 10px; border-radius: 6px; font-size: 12px; }
        .btn-table-download { background: rgba(16, 185, 129, 0.15); color: #a7f3d0; padding: 6px 12px; border-radius: 6px; font-size: 12px; text-decoration: none; display: inline-block; transition: 0.2s; }
        .btn-table-download:hover { background: rgba(16, 185, 129, 0.3); }

        /* --- TOAST --- */
        .toast { position: fixed; bottom: -80px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 12px 25px; border-radius: 20px; font-weight: 700; font-size: 14px; transition: 0.3s; z-index: 2000; display: flex; align-items: center; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .toast.show { bottom: 30px; }

        @media (max-width: 768px) {
            body { flex-direction: column-reverse; } 
            .sidebar { width: 100%; height: 70px; flex-direction: row; justify-content: space-around; padding: 0; border-right: none; border-top: 1px solid var(--border-light); }
            .sidebar .logo-placeholder, .agent-profile { display: none; } 
            .nav-menu { flex-direction: row; justify-content: center; gap: 20px; }
            .nav-item { padding: 10px; border-radius: 50%; }
            .nav-item span { display: none; }
            .main-wrapper { height: calc(100vh - 70px); }
            .top-header { padding: 0 15px; height: 60px; border-bottom: none; }
            .header-title { font-size: 16px; }
            .view-section { padding: 10px 15px; }
            .card-body { padding: 20px 15px; }
            .timer-text { font-size: 45px; }
            .btn-round { width: 55px; height: 55px; }
        }
    </style>
</head>
<body>

    <div class="login-overlay" id="login-overlay">
        <div class="login-box">
            <div class="logo-placeholder">I360</div>
            <h2>Acceso Operativo</h2>
            <p>Identifícate para iniciar gestión</p>
            <input type="text" id="agent-input" class="input-base" style="margin-bottom: 20px;" placeholder="Ej: PEDRO PEREZ" autocomplete="off" onkeypress="if(event.key === 'Enter') loginAgent()">
            <button class="btn-main" onclick="loginAgent()">Ingresar</button>
        </div>
    </div>

    <aside class="sidebar glass-panel">
        <div class="logo-placeholder">I360</div>
        <div class="agent-profile">
            <h3 id="display-agent-name">BackOffice</h3>
            <p>Conectado</p>
            <button class="btn-logout" onclick="logoutAgent()">Salir</button>
        </div>
        <nav class="nav-menu">
            <div class="nav-item active" onclick="switchView('workspace', this)" title="Grabadora">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                <span>Consola de Grabación</span>
            </div>
            <div class="nav-item" onclick="switchView('history', this)" title="Historial">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                <span>Auditoría</span>
            </div>
        </nav>
    </aside>

    <main class="main-wrapper">
        <header class="top-header">
            <div class="header-title" id="top-title">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                Interconexiones 360
            </div>
            <div class="avatar" id="header-avatar">U</div>
        </header>

        <section id="view-workspace" class="view-section active">
            <div class="workspace-center">
                <div class="unified-card glass-panel">
                    <div class="card-header">Terminal Operativa</div>
                    <div class="card-body">
                        
                        <div class="recorder-display">
                            <div class="status-text" id="status-text">ESPERANDO INICIO</div>
                            <div class="timer-text" id="timer">00:00:00</div>
                            <div class="audio-wave" id="audio-wave">
                                <div class="bar"></div><div class="bar"></div><div class="bar"></div>
                                <div class="bar"></div><div class="bar"></div>
                            </div>
                        </div>

                        <div class="controls-row">
                            <button class="btn-round btn-record" id="btn-record" onclick="startRecording()">
                                <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M7 4a3 3 0 016 0v4a3 3 0 11-6 0V4zm4 10.93A7.001 7.001 0 0017 8a1 1 0 10-2 0A5 5 0 015 8a1 1 0 00-2 0 7.001 7.001 0 006 6.93V17H6a1 1 0 100 2h8a1 1 0 100-2h-3v-2.07z" clip-rule="evenodd"></path></svg>
                            </button>
                            <button class="btn-round btn-pause" id="btn-pause" onclick="togglePause()" disabled>
                                <svg id="icon-pause" fill="currentColor" viewBox="0 0 20 20">
                                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>
                                </svg>
                            </button>
                            <button class="btn-round" id="btn-stop" onclick="stopRecording()" disabled>
                                <svg fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>
                            </button>
                        </div>

                        <div class="form-section">
                            <input type="text" class="input-base" id="record-title" placeholder="DNI o Nombre del Cliente" autocomplete="off">
                            <button class="btn-main" id="btn-save" disabled onclick="saveRecordingData()">Elegir carpeta y Guardar</button>
                        </div>

                    </div>
                </div>
            </div>
        </section>

        <section id="view-history" class="view-section">
            <div class="history-wrapper">
                <div class="search-box">
                    <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" class="input-base" onkeyup="filterHistory()" placeholder="Buscar por Nombre o Agente...">
                </div>
                <div class="table-container">
                    <table class="history-table" id="historyTable">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Archivo</th>
                                <th>Agente</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="history-body"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <div id="toast" class="toast">
            <svg fill="currentColor" viewBox="0 0 20 20" style="color: var(--success); width: 20px;"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            <span id="toast-msg">Mensaje</span>
        </div>
    </main>

    <script>
        // === CACHÉ DE ELEMENTOS DOM ===
        const UI = {
            loginOverlay: document.getElementById('login-overlay'),
            agentInput: document.getElementById('agent-input'),
            agentName: document.getElementById('display-agent-name'),
            avatar: document.getElementById('header-avatar'),
            topTitle: document.getElementById('top-title'),
            navItems: document.querySelectorAll('.nav-item'),
            views: document.querySelectorAll('.view-section'),
            toast: document.getElementById('toast'),
            toastMsg: document.getElementById('toast-msg'),
            timer: document.getElementById('timer'),
            wave: document.getElementById('audio-wave'),
            status: document.getElementById('status-text'),
            btnRecord: document.getElementById('btn-record'),
            btnPause: document.getElementById('btn-pause'),
            btnStop: document.getElementById('btn-stop'),
            btnSave: document.getElementById('btn-save'),
            iconPause: document.getElementById('icon-pause'),
            recordTitle: document.getElementById('record-title'),
            searchInput: document.getElementById('searchInput'),
            historyTable: document.getElementById('historyTable'),
            historyBody: document.getElementById('history-body')
        };

        const ICONS = {
            pause: '<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zM7 8a1 1 0 012 0v4a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v4a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd"></path>',
            play: '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path>',
            workspace: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg> Interconexiones 360',
            history: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg> Auditoría'
        };

        // === FIREBASE CONFIG ===
        const firebaseConfig = {
            apiKey: "AIzaSyDOynPkm0oO12UVCjwOp8592tMJiwXJAz0",
            authDomain: "crm-telecom-db014.firebaseapp.com",
            projectId: "crm-telecom-db014",
            storageBucket: "crm-telecom-db014.firebasestorage.app",
            messagingSenderId: "92366048720",
            appId: "1:92366048720:web:f45c610cdb1ed6326d7dd5",
            measurementId: "G-XXYC3NXKDG"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const storage = firebase.storage(); 

        let currentUser = "";

        window.onload = () => { checkSession(); loadHistoryTable(); };

        function updateAgentUI(name) {
            currentUser = name;
            UI.agentName.innerText = currentUser;
            UI.avatar.innerText = currentUser.charAt(0).toUpperCase();
            UI.loginOverlay.classList.add('hidden');
        }

        function checkSession() {
            const savedUser = localStorage.getItem('InterconexionesUser');
            if (savedUser) updateAgentUI(savedUser);
        }

        function loginAgent() {
            const nameInput = UI.agentInput.value.trim();
            if (!nameInput) return alert("Ingresa un nombre.");
            localStorage.setItem('InterconexionesUser', nameInput);
            updateAgentUI(nameInput);
            showToast(`Bienvenido, ${currentUser}`);
        }

        function logoutAgent() {
            localStorage.removeItem('InterconexionesUser');
            location.reload(); 
        }

        function switchView(viewId, element) {
            UI.navItems.forEach(el => el.classList.remove('active'));
            element.classList.add('active');
            UI.views.forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            UI.topTitle.innerHTML = viewId === 'workspace' ? ICONS.workspace : ICONS.history;
        }

        function showToast(msg) {
            UI.toastMsg.innerText = msg;
            UI.toast.classList.add('show');
            setTimeout(() => UI.toast.classList.remove('show'), 3000);
        }

        function filterHistory() {
            const filter = UI.searchInput.value.toUpperCase();
            const rows = UI.historyTable.getElementsByTagName("tr");
            for (let i = 1; i < rows.length; i++) {
                let text = rows[i].innerText.toUpperCase();
                rows[i].style.display = text.includes(filter) ? "" : "none";
            }
        }

        // === LÓGICA DE GRABADORA ===
        let mediaRecorder, audioChunks = [], isRecording = false, isPaused = false;
        let timerInt, sec = 0, lastDuration = "", audioBlobFinal = null;

        const formatTime = (seconds) => {
            const h = String(Math.floor(seconds / 3600)).padStart(2, '0');
            const m = String(Math.floor((seconds % 3600) / 60)).padStart(2, '0');
            const s = String(seconds % 60).padStart(2, '0');
            return h === "00" ? `${m}:${s}` : `${h}:${m}:${s}`;
        };

        function startTimer() {
            timerInt = setInterval(() => {
                sec++;
                UI.timer.textContent = formatTime(sec);
            }, 1000);
        }

        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    audioBlobFinal = new Blob(audioChunks, { type: 'audio/webm' });
                    UI.btnSave.disabled = false;
                    UI.recordTitle.focus();
                };

                mediaRecorder.start();
                isRecording = true; isPaused = false;
                
                UI.btnRecord.disabled = true; 
                UI.btnPause.disabled = false; 
                UI.btnStop.disabled = false; 
                UI.btnSave.disabled = true;
                
                UI.status.textContent = "GRABANDO"; 
                UI.status.className = "status-text recording";
                UI.wave.classList.add('active');
                UI.iconPause.innerHTML = ICONS.pause;

                sec = 0; 
                UI.timer.textContent = "00:00"; 
                startTimer();
            } catch (err) { alert("Permite el acceso al micrófono."); }
        }

        function togglePause() {
            if (!isRecording) return;
            if (isPaused) {
                mediaRecorder.resume(); 
                isPaused = false; 
                startTimer();
                UI.status.textContent = "GRABANDO"; 
                UI.status.className = "status-text recording";
                UI.wave.classList.add('active');
                UI.iconPause.innerHTML = ICONS.pause;
            } else {
                mediaRecorder.pause(); 
                isPaused = true; 
                clearInterval(timerInt);
                UI.status.textContent = "PAUSADO - CLIC PARA REANUDAR"; 
                UI.status.className = "status-text paused";
                UI.wave.classList.remove('active');
                UI.iconPause.innerHTML = ICONS.play;
            }
        }

        function stopRecording() {
            if(!isRecording) return;
            mediaRecorder.stop();
            mediaRecorder.stream.getTracks().forEach(t => t.stop());
            clearInterval(timerInt); 
            lastDuration = UI.timer.textContent;
            isRecording = false; isPaused = false;

            UI.btnRecord.disabled = false; 
            UI.btnPause.disabled = true; 
            UI.btnStop.disabled = true;
            UI.status.textContent = "LISTO PARA GUARDAR"; 
            UI.status.className = "status-text";
            UI.wave.classList.remove('active');
            UI.iconPause.innerHTML = ICONS.pause;
        }

        async function saveRecordingData() {
            let title = UI.recordTitle.value.trim() || "Audio_Generico";
            let localFileName = `${title}.webm`;
            const cloudFileName = `audios/${title}_${Date.now()}.webm`;

            try {
                if (window.showSaveFilePicker) {
                    const handle = await window.showSaveFilePicker({
                        suggestedName: localFileName,
                        types: [{ description: 'Archivo de Audio', accept: {'audio/webm': ['.webm']} }],
                    });
                    const writable = await handle.createWritable();
                    await writable.write(audioBlobFinal);
                    await writable.close();
                } else {
                    const url = URL.createObjectURL(audioBlobFinal);
                    const a = document.createElement('a');
                    a.href = url; a.download = localFileName; a.click();
                    URL.revokeObjectURL(url);
                }

                showToast("Guardado local exitoso. Sincronizando con Firebase...");

                // Reset UI state
                const currentBlob = audioBlobFinal, currentDur = lastDuration;
                UI.timer.textContent = "00:00"; 
                UI.status.textContent = "ESPERANDO INICIO";
                UI.recordTitle.value = ''; 
                UI.btnSave.disabled = true;
                audioBlobFinal = null;

                // Subida
                const snapshot = await storage.ref(cloudFileName).put(currentBlob);
                const cloudUrl = await snapshot.ref.getDownloadURL();
                
                const d = new Date();
                const dateStr = `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;

                await db.collection("historial_llamadas").add({
                    fecha: dateStr, nombre: title, duracion: currentDur, agente: currentUser,
                    audioUrl: cloudUrl, timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                showToast("Audio respaldado en la nube correctamente.");

            } catch (err) {
                if (err.name === 'AbortError') return; 
                console.error(err); 
                showToast("Error al guardar."); 
            }
        }

        function loadHistoryTable() {
            db.collection("historial_llamadas").orderBy("timestamp", "desc").limit(30).onSnapshot((snap) => {
                UI.historyBody.innerHTML = ''; 
                if (snap.empty) return UI.historyBody.innerHTML = `<tr><td colspan="4" style="text-align:center;">Sin registros</td></tr>`;
                
                let htmlBuffer = "";
                snap.forEach((doc) => {
                    const item = doc.data();
                    const btn = item.audioUrl ? `<a href="${item.audioUrl}" target="_blank" class="btn-table-download">Descargar</a>` : `-`;
                    htmlBuffer += `<tr>
                        <td style="color:var(--text-muted); font-size:12px;">${item.fecha}</td>
                        <td style="font-weight:700;">${item.nombre} <br><span style="font-size:11px; color:var(--primary)">${item.duracion}</span></td>
                        <td><span class="agent-tag">${item.agente}</span></td>
                        <td>${btn}</td>
                    </tr>`;
                });
                UI.historyBody.innerHTML = htmlBuffer;
            });
        }
    </script>
</body>
</html>
